<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Family Travel - Gastos</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0369a1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GastosViaje">
    <link rel="apple-touch-icon" href="icon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: #f8fafc; 
            -webkit-tap-highlight-color: transparent;
            font-size: 16px;
            color: #0f172a;
        }

        .glass-card { 
            background: #ffffff; 
            border-radius: 1.25rem; 
            border: 2px solid #e2e8f0; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .tab-active { 
            border-bottom: 5px solid #0284c7; 
            color: #0284c7 !important; 
            font-weight: 900 !important; 
        }
        
        input, select, textarea { 
            background: #ffffff; 
            border: 2px solid #cbd5e1; 
            border-radius: 0.75rem; 
            padding: 1rem;
            font-size: 1.1rem;
            width: 100%; 
            color: #0f172a; 
            font-weight: 600;
        }

        #trip-title { 
            background: rgba(255, 255, 255, 0.15); 
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: white; 
            font-size: 1.4rem; 
            font-weight: 800;
            padding: 0.6rem 0.8rem;
            border-radius: 0.75rem;
            width: 100%;
            height: auto;
            min-height: 3rem;
            resize: none;
            overflow: hidden;
            line-height: 1.1;
            text-align: center;
        }

        .btn-primary {
            background: #0284c7;
            color: white;
            font-weight: 800;
            font-size: 1rem;
            padding: 1rem;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(2, 132, 199, 0.3);
            cursor: pointer;
            border: none;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
        }

        .label-text {
            font-size: 0.75rem;
            font-weight: 800;
            color: #334155;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.3rem;
            display: block;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem 1rem;
            min-height: 85vh;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 md:p-8 pb-32">

    <div class="max-w-3xl mx-auto">
        <header id="app-header" class="bg-gradient-to-br from-sky-700 to-indigo-600 p-5 rounded-[1.5rem] text-white shadow-xl mb-6 hidden">
            <div class="flex flex-col gap-3">
                <textarea id="trip-title" placeholder="Nombre del viaje..." rows="1" oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'" onblur="window.actualizarTitulo(this.value)"></textarea>
                <div class="flex justify-between items-center bg-white/10 p-4 rounded-xl backdrop-blur-md border border-white/10">
                    <div class="text-[10px] font-black uppercase opacity-80 tracking-widest">Gasto Total</div>
                    <div id="total-trip" class="text-2xl font-black tabular-nums">0.00€</div>
                </div>
                <button onclick="window.cerrarViaje()" class="w-full py-2 bg-rose-500/20 hover:bg-rose-500/40 border border-rose-500/30 rounded-lg text-[10px] font-black uppercase tracking-[0.2em] transition-colors">
                    Finalizar y Cerrar Viaje
                </button>
            </div>
        </header>

        <nav id="app-nav" class="flex justify-around mb-6 border-b-2 border-slate-200 gap-2 hidden overflow-x-auto no-scrollbar">
            <button onclick="window.switchTab('registro')" id="tab-registro" class="pb-2 text-xs font-bold flex-1 whitespace-nowrap">GASTOS</button>
            <button onclick="window.switchTab('personas')" id="tab-personas" class="pb-2 text-xs font-bold flex-1 whitespace-nowrap">VIAJEROS</button>
            <button onclick="window.switchTab('resumen')" id="tab-resumen" class="pb-2 text-xs font-bold flex-1 whitespace-nowrap">CUENTAS</button>
            <button onclick="window.switchTab('lista-viajes')" id="tab-lista-viajes" class="pb-2 text-xs font-bold flex-1 whitespace-nowrap">HISTORIAL</button>
        </nav>

        <section id="sec-vacio" class="empty-state">
            <div class="bg-sky-100 text-sky-600 p-6 rounded-full mb-6 text-4xl shadow-inner">✈️</div>
            <h1 class="text-2xl font-black text-slate-800 mb-2">Mis Gastos de Viaje</h1>
            <p class="text-slate-500 mb-8 font-medium">Crea un viaje nuevo para empezar o revisa tus viajes anteriores.</p>
            <div class="w-full space-y-4 max-w-xs">
                <button onclick="window.crearNuevoViaje()" class="btn-primary">Nuevo Viaje</button>
                <button onclick="window.switchTab('lista-viajes')" class="w-full py-3 font-black text-sky-700 uppercase tracking-widest text-xs">Ver Historial</button>
            </div>
        </section>

        <section id="sec-registro" class="hidden">
            <div class="glass-card p-5 mb-6">
                <form id="form-gasto" class="space-y-4" onsubmit="window.registrarGasto(event)">
                    <div>
                        <label class="label-text">Concepto</label>
                        <input type="text" id="gasto-concepto" placeholder="¿En qué gastaste?" required>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="label-text">Importe (€)</label>
                            <input type="number" step="0.01" id="gasto-importe" placeholder="0.00" required>
                        </div>
                        <div>
                            <label class="label-text">Fecha</label>
                            <input type="date" id="gasto-fecha" required>
                        </div>
                    </div>
                    <div>
                        <label class="flex items-center gap-2 p-3 bg-slate-50 rounded-xl text-[10px] font-black border border-slate-100 uppercase cursor-pointer">
                            <input type="checkbox" id="gasto-acuenta" class="w-4 h-4 text-sky-600">
                            <span>A cuenta (Reduce mi deuda)</span>
                        </label>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="label-text">Quién pagó</label>
                            <select id="gasto-pagador"></select>
                        </div>
                        <div>
                            <label class="label-text">Categoría</label>
                            <select id="gasto-categoria">
                                <option>Comida</option><option>Transporte</option><option>Alojamiento</option><option>Ocio</option><option>Otros</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="label-text">Foto Ticket</label>
                        <input type="file" id="gasto-ticket" accept="image/*" onchange="window.handleImageUpload(event)" class="text-xs">
                        <div id="ticket-preview-container" class="mt-2 hidden">
                            <img id="ticket-preview" src="" class="rounded-lg border border-slate-200 w-full object-cover h-32">
                            <button type="button" onclick="window.removeImage()" class="text-rose-500 text-[10px] font-black uppercase mt-1">Eliminar foto</button>
                        </div>
                    </div>
                    <div id="reparto-check" class="grid grid-cols-2 gap-2"></div>
                    <button type="submit" class="btn-primary mt-2">Guardar</button>
                </form>
            </div>
            <div class="glass-card overflow-hidden">
                <table class="w-full text-left">
                    <tbody id="tabla-gastos"></tbody>
                </table>
            </div>
        </section>

        <section id="sec-personas" class="hidden">
            <div class="glass-card p-5">
                <label class="label-text mb-2">Añadir Viajero</label>
                <div class="flex gap-2 mb-6">
                    <input type="text" id="nuevo-nombre" placeholder="Nombre...">
                    <button onclick="window.agregarPersona()" class="btn-primary w-auto px-5">Añadir</button>
                </div>
                <div id="lista-personas" class="space-y-2"></div>
            </div>
        </section>

        <section id="sec-resumen" class="hidden">
            <div class="glass-card p-5 mb-6 flex justify-center">
                <canvas id="chartCategorias" style="max-height: 200px;"></canvas>
            </div>
            <div id="balance-lista" class="glass-card p-5 mb-6 space-y-3"></div>
            <div id="liquidacion-lista" class="glass-card p-5 bg-slate-900 text-white space-y-3 rounded-2xl shadow-xl"></div>
        </section>

        <section id="sec-lista-viajes" class="hidden">
            <div class="flex justify-between items-center mb-6 px-1">
                <h2 class="text-sm font-black text-slate-400 uppercase tracking-widest">Historial de Viajes</h2>
            </div>
            <div id="contenedor-viajes" class="space-y-3"></div>
        </section>
    </div>

    <div id="modal-foto" class="fixed inset-0 z-50 bg-black/90 hidden items-center justify-center p-4" onclick="this.style.display='none'">
        <img id="img-full" src="" class="max-w-full max-h-full rounded shadow-2xl">
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, updateDoc, arrayUnion, arrayRemove, deleteDoc, getDocs, writeBatch, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Registro de Service Worker para PWA (Crucial para Android)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW registrado', reg))
                    .catch(err => console.log('Error SW', err));
            });
        }

        const firebaseConfig = {
            apiKey: "AIzaSyDdtYa40DVdderCnpQjoQsWwWEcWeBGiHQ",
            authDomain: "familytravel-6cc08.firebaseapp.com",
            projectId: "familytravel-6cc08",
            storageBucket: "familytravel-6cc08.firebasestorage.app",
            messagingSenderId: "1073359509650",
            appId: "1:1073359509650:web:871f7b03041a5c519dee4b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.appState = { tripId: null, personas: [], gastos: [], currentTicketBase64: null };
        let unsubscribeConfig, unsubscribeGastos, chartInstance;

        async function init() {
            onAuthStateChanged(auth, async (user) => {
                if (!user) { await signInAnonymously(auth); return; }
                window.switchTab('vacio');
                escucharTodosLosViajes();
            });
        }

        window.switchTab = (t) => {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active'));
            
            const sec = document.getElementById('sec-' + t);
            if (sec) sec.classList.remove('hidden');

            const btn = document.getElementById('tab-' + t);
            if (btn) btn.classList.add('tab-active');

            const hasTrip = !!window.appState.tripId;
            if (t === 'vacio') {
                document.getElementById('app-header').classList.add('hidden');
                document.getElementById('app-nav').classList.add('hidden');
            } else {
                document.getElementById('app-header').classList.toggle('hidden', !hasTrip);
                document.getElementById('app-nav').classList.toggle('hidden', !hasTrip && t !== 'lista-viajes');
            }

            if(t === 'resumen') window.calcularBalances();
            window.scrollTo(0, 0);
        };

        window.cargarViaje = (id) => {
            window.appState.tripId = id;
            localStorage.setItem('activeTripId', id);
            window.conectarViaje();
            window.switchTab('registro');
        };

        window.conectarViaje = () => {
            if (!window.appState.tripId) return;
            if (unsubscribeConfig) unsubscribeConfig();
            if (unsubscribeGastos) unsubscribeGastos();

            unsubscribeConfig = onSnapshot(doc(db, "viajes", window.appState.tripId), (d) => {
                if (!d.exists()) return;
                const data = d.data();
                window.appState.personas = data.personas || [];
                const titleEl = document.getElementById('trip-title');
                titleEl.value = data.title || "";
                titleEl.style.height = 'auto';
                titleEl.style.height = titleEl.scrollHeight + 'px';
                window.actualizarUI();
            });

            unsubscribeGastos = onSnapshot(collection(db, "viajes", window.appState.tripId, "gastos"), (qs) => {
                window.appState.gastos = qs.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                window.actualizarUI();
            });
        };

        window.crearNuevoViaje = async () => {
            const newId = `trip_${Date.now()}`;
            await setDoc(doc(db, "viajes", newId), { 
                title: "", 
                personas: [], 
                status: "active", 
                createdAt: Date.now() 
            });
            window.cargarViaje(newId);
        };

        window.actualizarUI = () => {
            const { personas, gastos } = window.appState;
            const total = gastos.reduce((s, g) => s + (g.esACuenta ? 0 : g.importe), 0);
            document.getElementById('total-trip').innerText = `${total.toFixed(2)}€`;

            document.getElementById('gasto-pagador').innerHTML = personas.map(p => `<option value="${p}">${p}</option>`).join('');
            document.getElementById('reparto-check').innerHTML = personas.map(p => `
                <label class="flex items-center gap-2 p-3 bg-slate-50 rounded-xl text-[10px] font-black border border-slate-100 uppercase">
                    <input type="checkbox" value="${p}" checked class="reparto-chk"> ${p}
                </label>
            `).join('');

            document.getElementById('tabla-gastos').innerHTML = gastos.sort((a,b)=>b.timestamp-a.timestamp).map(g => `
                <tr class="border-b border-slate-100">
                    <td class="p-4" onclick="${g.ticket ? `window.showImage('${g.ticket}')` : ''}">
                        <div class="flex items-center gap-3">
                            ${g.ticket ? `<div class="w-10 h-10 bg-sky-50 rounded-lg flex items-center justify-center text-lg border border-sky-100">📸</div>` : ''}
                            <div>
                                <div class="font-black text-slate-800 text-sm ${g.esACuenta ? 'text-teal-600' : ''}">${g.concepto}</div>
                                <div class="text-[9px] text-slate-400 font-bold uppercase">${g.fecha || ''} • ${g.pagador}</div>
                            </div>
                        </div>
                    </td>
                    <td class="p-4 text-right">
                        <div class="font-black text-slate-900">${g.importe.toFixed(2)}€</div>
                        <button onclick="window.eliminarGasto('${g.id}')" class="text-rose-400 text-[9px] font-black uppercase tracking-widest">Eliminar</button>
                    </td>
                </tr>
            `).join('');

            document.getElementById('lista-personas').innerHTML = personas.map(p => `
                <div class="flex justify-between p-3 bg-white border border-slate-200 rounded-xl font-black text-xs shadow-sm uppercase">
                    ${p} <button onclick="window.eliminarPersona('${p}')" class="text-rose-500 px-2 font-bold text-lg">×</button>
                </div>
            `).join('');
        };

        function escucharTodosLosViajes() {
            onSnapshot(collection(db, "viajes"), (qs) => {
                const viajes = qs.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                document.getElementById('contenedor-viajes').innerHTML = viajes.sort((a,b)=>b.createdAt-a.createdAt).map(v => `
                    <div class="p-4 bg-white rounded-2xl border-2 ${v.id === window.appState.tripId ? 'border-sky-500 shadow-md' : 'border-slate-100'} flex justify-between items-center transition-all active:scale-95">
                        <div onclick="window.cargarViaje('${v.id}')" class="flex-1 cursor-pointer">
                            <div class="font-black text-slate-800">${v.title || 'Viaje sin título'}</div>
                            <div class="text-[9px] text-slate-400 font-black uppercase tracking-widest">${v.status || 'Activo'}</div>
                        </div>
                        <button onclick="window.eliminarViaje('${v.id}')" class="text-rose-500 p-2 opacity-40 hover:opacity-100">🗑️</button>
                    </div>
                `).join('');
            });
        }

        window.handleImageUpload = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                window.appState.currentTicketBase64 = ev.target.result;
                document.getElementById('ticket-preview').src = ev.target.result;
                document.getElementById('ticket-preview-container').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        };

        window.removeImage = () => {
            window.appState.currentTicketBase64 = null;
            document.getElementById('gasto-ticket').value = "";
            document.getElementById('ticket-preview-container').classList.add('hidden');
        };

        window.registrarGasto = async (e) => {
            e.preventDefault();
            const esACuenta = document.getElementById('gasto-acuenta').checked;
            const pagador = document.getElementById('gasto-pagador').value;
            const reparto = Array.from(document.querySelectorAll('.reparto-chk:checked')).map(c => c.value);
            
            if (!reparto.length && !esACuenta) return alert("Selecciona quién comparte este gasto");
            
            const gasto = {
                concepto: document.getElementById('gasto-concepto').value + (esACuenta ? " (PAGO A CUENTA)" : ""),
                importe: parseFloat(document.getElementById('gasto-importe').value),
                fecha: document.getElementById('gasto-fecha').value,
                pagador: pagador,
                categoria: esACuenta ? "Abono" : document.getElementById('gasto-categoria').value,
                reparto: esACuenta ? [pagador] : reparto,
                esACuenta: esACuenta,
                ticket: window.appState.currentTicketBase64,
                timestamp: Date.now()
            };
            
            await setDoc(doc(collection(db, "viajes", window.appState.tripId, "gastos")), gasto);
            e.target.reset();
            window.removeImage();
            document.getElementById('gasto-fecha').valueAsDate = new Date();
        };

        window.showImage = (src) => {
            document.getElementById('img-full').src = src;
            document.getElementById('modal-foto').style.display = 'flex';
        };

        window.agregarPersona = async () => {
            const n = document.getElementById('nuevo-nombre').value.trim();
            if (n) await updateDoc(doc(db, "viajes", window.appState.tripId), { personas: arrayUnion(n) });
            document.getElementById('nuevo-nombre').value = "";
        };

        window.eliminarPersona = async (p) => {
            if(confirm(`¿Eliminar a ${p}?`)) await updateDoc(doc(db, "viajes", window.appState.tripId), { personas: arrayRemove(p) });
        };

        window.eliminarGasto = async (id) => {
            if(confirm("¿Eliminar este gasto?")) await deleteDoc(doc(db, "viajes", window.appState.tripId, "gastos", id));
        };

        window.actualizarTitulo = async (t) => {
            if(window.appState.tripId) await updateDoc(doc(db, "viajes", window.appState.tripId), { title: t });
        };

        window.cerrarViaje = async () => {
            if (!window.appState.tripId) return;
            if (confirm("¿Finalizar viaje? Se marcará como completado.")) {
                await updateDoc(doc(db, "viajes", window.appState.tripId), { status: "Cerrado" });
            }
        };

        window.eliminarViaje = async (id) => {
            if (!confirm("Esto eliminará el viaje y TODOS sus gastos. ¿Continuar?")) return;
            const batch = writeBatch(db);
            const gastos = await getDocs(collection(db, "viajes", id, "gastos"));
            gastos.forEach(d => batch.delete(d.ref));
            batch.delete(doc(db, "viajes", id));
            await batch.commit();
            if (id === window.appState.tripId) {
                window.appState.tripId = null;
                localStorage.removeItem('activeTripId');
                window.switchTab('vacio');
            }
        };

        window.calcularBalances = () => {
            const { personas, gastos } = window.appState;
            const balance = {}; const cats = {};
            personas.forEach(p => balance[p] = 0);
            
            gastos.forEach(g => {
                if (!g.esACuenta) {
                    cats[g.categoria] = (cats[g.categoria] || 0) + g.importe;
                    balance[g.pagador] += g.importe;
                    const cuota = g.importe / (g.reparto.length || 1);
                    g.reparto.forEach(p => balance[p] -= cuota);
                } else {
                    // Lógica A CUENTA: Solo suma balance positivo al pagador para saldar su deuda
                    balance[g.pagador] += g.importe;
                }
            });

            document.getElementById('balance-lista').innerHTML = `<h3 class="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-3">Balance Individual</h3>` + Object.entries(balance).map(([p, b]) => `
                <div class="flex justify-between font-black text-xs border-b border-slate-50 py-1">
                    <span>${p}</span>
                    <span class="${b>=0?'text-teal-600':'text-rose-600'}">${b>=0?'+':''}${b.toFixed(2)}€</span>
                </div>
            `).join('');

            const ctx = document.getElementById('chartCategorias').getContext('2d');
            if(chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(cats),
                    datasets: [{ data: Object.values(cats), backgroundColor: ['#0ea5e9', '#6366f1', '#f59e0b', '#f43f5e', '#10b981'] }]
                },
                options: { plugins: { legend: { position: 'bottom', labels: { font: { weight: 'bold', size: 10 } } } } }
            });

            const deudores = Object.entries(balance).filter(x => x[1] < -0.01).sort((a,b)=>a[1]-b[1]);
            const acreedores = Object.entries(balance).filter(x => x[1] > 0.01).sort((a,b)=>b[1]-a[1]);
            let html = '<h3 class="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-4">Reparto de pagos</h3>';
            
            let i=0, j=0;
            const deudoresCopia = deudores.map(d => [d[0], d[1]]);
            const acreedoresCopia = acreedores.map(a => [a[0], a[1]]);

            while(i < deudoresCopia.length && j < acreedoresCopia.length){
                const monto = Math.min(Math.abs(deudoresCopia[i][1]), acreedoresCopia[j][1]);
                html += `<div class="text-xs font-bold py-2 border-b border-white/5 flex items-center gap-2">
                    <span class="text-rose-400 bg-rose-500/10 px-2 py-0.5 rounded">${deudoresCopia[i][0]}</span>
                    <span class="opacity-40">➔</span>
                    <span class="text-teal-400">${monto.toFixed(2)}€</span>
                    <span class="opacity-40">➔</span>
                    <span class="text-sky-400 bg-sky-500/10 px-2 py-0.5 rounded">${acreedoresCopia[j][0]}</span>
                </div>`;
                deudoresCopia[i][1] += monto; acreedoresCopia[j][1] -= monto;
                if(Math.abs(deudoresCopia[i][1]) < 0.01) i++;
                if(Math.abs(acreedoresCopia[j][1]) < 0.01) j++;
            }
            document.getElementById('liquidacion-lista').innerHTML = html || '<p class="text-[10px] font-black opacity-30 text-center uppercase py-4">Todo saldado</p>';
        };

        window.onload = () => {
            document.getElementById('gasto-fecha').valueAsDate = new Date();
            init();
        };
    </script>
</body>
</html>
